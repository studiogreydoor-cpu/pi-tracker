services:
  - type: web
    name: pi-tracker
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: node src/server.js
    envVars:
      - key: APP_PASSWORD
        sync: false
      - key: APP_SECRET
        generateValue: true
      - key: DATA_DIR
        value: /var/data
    disk:
      name: tracker-data
      mountPath: /var/data
      sizeGB: 1
