<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PI Production Tracker</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#1F4D36">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="apple-touch-icon" href="/icon.svg">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root{
    --bg:#F5F1E8; --bg2:#EBE5D8; --card:#FFFDF8; --card2:#F7F2E7; --line:#E2DACA;
    --ink:#252B21; --muted:#7C7565; --faint:#ADA593;
    --green:#1F4D36; --green-l:#2E6B4A; --brass:#C08A2E; --brass-d:#9A6D1F;
    /* status colours — deliberately vivid so the picture reads instantly */
    --late:#D7362A; --late-bg:#FCE8E6; --late-line:#F3B7B1;
    --soon:#E89611; --soon-bg:#FDF1DC; --soon-line:#F5D08A;
    --ok:#1E8E4E; --ok-bg:#E4F4EA; --ok-line:#A9DCBE;
    --done:#8A8578; --done-bg:#EFEBE1;
    --shadow:0 1px 2px rgba(37,43,33,.04),0 6px 20px rgba(37,43,33,.06);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Outfit',system-ui,sans-serif;font-size:14px;-webkit-font-smoothing:antialiased}
  .app{display:flex;min-height:100vh}
  .side{width:238px;flex:none;background:var(--green);color:#E9EFE9;padding:22px 15px;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;gap:3px}
  .brand{display:flex;align-items:center;gap:11px;padding:0 6px 16px;border-bottom:1px solid rgba(255,255,255,.13);margin-bottom:10px}
  .brand .mark{width:38px;height:38px;border-radius:10px;background:var(--brass);display:grid;place-items:center;font-family:'Fraunces',serif;font-weight:700;color:#1B2418;font-size:19px;flex:none;overflow:hidden}
  .brand .mark img{width:100%;height:100%;object-fit:cover}
  .brand b{font-family:'Fraunces',serif;font-weight:600;font-size:15px;line-height:1.15;color:#FFFDF8}
  .brand span{display:block;font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:#9FB6A5;margin-top:2px}
  /* company switcher */
  .cswitch{position:relative;margin:0 0 12px}
  .cswitch>button{width:100%;display:flex;align-items:center;justify-content:space-between;gap:8px;background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.14);color:#E9EFE9;padding:9px 11px;border-radius:9px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit}
  .cswitch>button:hover{background:rgba(255,255,255,.15)}
  .cmenu{display:none;position:absolute;left:0;right:0;top:calc(100% + 5px);background:var(--card);border:1px solid var(--line);border-radius:10px;box-shadow:0 10px 30px rgba(0,0,0,.18);z-index:50;overflow:hidden}
  .cmenu.open{display:block}
  .cmenu button{width:100%;text-align:left;background:none;border:none;padding:10px 12px;font-size:13px;color:var(--ink);cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:8px}
  .cmenu button:hover{background:var(--card2)}
  .cmenu button.on{color:var(--green);font-weight:600}
  .cmenu .sep{border-top:1px solid var(--line)}
  .nav{display:flex;flex-direction:column;gap:2px}
  .nav button{display:flex;align-items:center;gap:11px;width:100%;text-align:left;background:none;border:none;color:#BCCFC0;padding:10px 12px;border-radius:9px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;transition:background .15s,color .15s}
  .nav button:hover{background:rgba(255,255,255,.09);color:#fff}
  .nav button.on{background:var(--brass);color:#1B2418;font-weight:600}
  .nav .ic{width:18px;text-align:center;font-size:14px}
  .side .foot{margin-top:auto;padding-top:14px;border-top:1px solid rgba(255,255,255,.13)}
  .side .foot button{background:none;border:none;color:#9FB6A5;cursor:pointer;font-size:12.5px;padding:6px 0;font-family:inherit}
  .main{flex:1;min-width:0;padding:26px 32px 70px}
  .head{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;margin-bottom:22px;flex-wrap:wrap}
  h1{font-family:'Fraunces',serif;font-weight:600;font-size:26px;margin:0;color:var(--ink)}
  .sub{color:var(--muted);font-size:13px;margin-top:3px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;box-shadow:var(--shadow)}
  .tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px}
  .tile{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:15px 17px;position:relative;overflow:hidden;box-shadow:var(--shadow)}
  .tile .k{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:600}
  .tile .v{font-family:'Fraunces',serif;font-weight:700;font-size:30px;line-height:1.05;margin-top:7px;color:var(--ink)}
  .tile.clay .v,.tile.brass .v{color:var(--brass-d)} .tile.late .v,.tile.red .v{color:var(--late)} .tile.green .v{color:var(--ok)}
  .tile .edge{position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--green-l)}
  .tile.clay .edge,.tile.brass .edge{background:var(--brass)} .tile.late .edge,.tile.red .edge{background:var(--late)} .tile.green .edge{background:var(--ok)}
  .charts{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px;margin-bottom:20px}
  .chart-card h3{font-family:'Fraunces',serif;font-weight:600;font-size:15px;margin:0 0 12px;color:var(--ink)}
  .chart-wrap{position:relative;height:220px}
  .tablewrap{overflow:auto;border:1px solid var(--line);border-radius:14px;background:var(--card);box-shadow:var(--shadow)}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{text-align:left;background:var(--bg2);color:var(--muted);padding:10px 13px;font-size:10px;letter-spacing:.07em;text-transform:uppercase;font-weight:700;position:sticky;top:0;z-index:1}
  td{padding:10px 13px;border-top:1px solid var(--line);vertical-align:middle}
  tr:hover td{background:var(--card2)}
  .rail{border-left:5px solid transparent}
  .row-green{border-left-color:var(--ok);background:linear-gradient(90deg,var(--ok-bg) 0,transparent 90px)}
  .row-amber{border-left-color:var(--soon);background:linear-gradient(90deg,var(--soon-bg) 0,transparent 90px)}
  .row-red{border-left-color:var(--late);background:linear-gradient(90deg,var(--late-bg) 0,transparent 90px)}
  .row-done{border-left-color:var(--faint)}
  .pill{display:inline-flex;align-items:center;gap:5px;padding:3px 11px;border-radius:99px;font-size:11px;font-weight:700;white-space:nowrap}
  .p-green{background:var(--ok-bg);color:var(--ok)} .p-amber{background:var(--soon-bg);color:#9A6205}
  .p-red{background:var(--late);color:#fff} .p-done{background:var(--done-bg);color:var(--done)}
  .vtag{display:inline-block;padding:2px 9px;border-radius:6px;font-size:11.5px;font-weight:600;margin:1px}
  .bar{height:8px;background:var(--bg2);border-radius:99px;overflow:hidden;min-width:60px}
  .bar span{display:block;height:100%;border-radius:99px;background:var(--ok)}
  .code{font-weight:700;color:var(--green)}
  .desc{color:var(--muted);font-size:12.5px}
  button.btn{font-family:inherit;font-size:13px;font-weight:600;border-radius:9px;padding:9px 16px;cursor:pointer;border:1.5px solid var(--green);background:var(--green);color:#F5F1E8;transition:background .15s}
  button.btn:hover{background:var(--green-l)}
  button.btn.ghost{background:transparent;color:var(--green)}
  button.btn.ghost:hover{background:var(--card2)}
  button.btn.brass{background:var(--brass);border-color:var(--brass);color:#231A05}
  button.btn.danger{background:var(--late);border-color:var(--late);color:#fff}
  button.btn.tiny{padding:4px 11px;font-size:12px}
  input,select,textarea{font-family:inherit;font-size:13px;padding:9px 11px;border:1.5px solid var(--line);border-radius:8px;background:#fff;color:var(--ink);outline:none;width:100%}
  input:focus,select:focus{border-color:var(--brass)}
  input[type=checkbox]{width:auto;accent-color:var(--green)}
  label{display:block;font-size:10.5px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
  .chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
  .chips button{padding:6px 14px;border-radius:99px;font-size:12.5px;font-weight:600;cursor:pointer;border:1.5px solid var(--line);background:var(--card);color:var(--muted)}
  .chips button.on{background:var(--green);color:#F5F1E8;border-color:var(--green)}
  .grid2{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:11px}
  .msg{padding:11px 15px;border-radius:9px;font-size:13px;margin-bottom:15px;font-weight:500}
  .msg.ok{background:var(--ok-bg);border:1px solid var(--ok-line);color:var(--ok)}
  .msg.err{background:var(--late-bg);border:1px solid var(--late-line);color:var(--late)}
  .empty{padding:42px;text-align:center;color:var(--muted)}
  /* big focus blocks */
  .focus{border-radius:16px;padding:20px 22px;margin-bottom:18px;box-shadow:var(--shadow)}
  .focus.late{background:var(--late-bg);border:2px solid var(--late-line)}
  .focus.week{background:var(--card);border:1px solid var(--line)}
  .focus h2{font-family:'Fraunces',serif;font-weight:700;font-size:19px;margin:0;display:flex;align-items:center;gap:11px}
  .focus.late h2{color:var(--late)}
  .focus .count{font-family:'Fraunces',serif;font-weight:700;font-size:40px;line-height:1}
  .focus.late .count{color:var(--late)}
  .focus.week .count{color:var(--soon)}
  .fhead{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:14px}
  .flist{display:flex;flex-direction:column;gap:7px}
  .frow{display:grid;grid-template-columns:auto 1fr auto auto;gap:12px;align-items:center;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 13px}
  .focus.late .frow{border-color:var(--late-line)}
  .frow .item{font-weight:700;color:var(--green);white-space:nowrap}
  .frow .meta{color:var(--muted);font-size:12.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .frow .when{font-weight:700;font-size:12.5px;white-space:nowrap}
  .weekgroup{margin-bottom:20px}
  .weekgroup h4{font-family:'Fraunces',serif;font-weight:600;font-size:15px;margin:0 0 4px;color:var(--green)}
  .calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:7px;margin-top:9px}
  .calcell{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:8px 9px;min-height:80px}
  .calcell .d{font-size:10px;color:var(--muted);margin-bottom:6px;font-weight:600}
  .calcell.today{border-color:var(--brass);border-width:2px}
  .calitem{font-size:11px;padding:3px 7px;border-radius:5px;margin-bottom:4px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ci-red{background:var(--late);color:#fff} .ci-amber{background:var(--soon-bg);color:#9A6205;border:1px solid var(--soon-line)} .ci-green{background:var(--ok-bg);color:var(--ok);border:1px solid var(--ok-line)}
  .skucard{padding:0;overflow:hidden}
  .skuhead{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:13px 16px;cursor:pointer;flex-wrap:wrap}
  .skuhead:hover{background:var(--card2)}
  .skustats{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .chev{color:var(--muted);font-size:12px}
  .skubody{border-top:1px solid var(--line);padding:14px 16px;background:var(--bg2)}
  .vsection{margin-bottom:14px}
  .vsechead{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .vsechead b{font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:var(--muted)}
  .vblock{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:11px 12px;margin-bottom:9px}
  .vtop{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:9px}
  .vgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(108px,1fr));gap:8px}
  .vgrid label{margin-bottom:3px;font-size:9.5px}
  .extras{display:flex;gap:16px;flex-wrap:wrap;align-items:center}
  .cbx{display:flex;align-items:center;gap:7px;text-transform:none;letter-spacing:0;font-size:13px;color:var(--ink);margin:0;font-weight:500}
  .pigrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:12px}
  .picard{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:15px 16px;cursor:pointer;box-shadow:var(--shadow);transition:border-color .15s}
  .picard:hover{border-color:var(--brass)}
  .pihead{display:flex;justify-content:space-between;align-items:start;gap:8px}
  .pihead b{font-family:'Fraunces',serif;font-weight:600;font-size:16px}
  .pinums{display:flex;gap:14px;font-size:12.5px;color:var(--muted);margin-top:9px}
  .pinums b{color:var(--ink);font-size:14px}
  .vrow{display:flex;gap:5px;flex-wrap:wrap}
  .vchip{font-size:11px;font-weight:600;padding:3px 9px;border-radius:99px;border:1px solid transparent}
  .vok{background:var(--ok-bg);color:var(--ok);border-color:var(--ok-line)}
  .vlate{background:var(--late-bg);color:var(--late);border-color:var(--late-line)}
  table.grid td{padding:6px 8px}
  table.grid th{padding:8px}
  .mini{padding:5px 7px;font-size:12px;border-radius:6px;min-width:96px}
  .mini.num{width:62px;min-width:0;text-align:right}
  .ctr{text-align:center}
  .cell-copy{display:flex;align-items:center;gap:3px}
  .copydown{border:1px solid var(--line);background:var(--card2);color:var(--muted);border-radius:5px;width:20px;height:22px;line-height:1;font-size:12px;cursor:pointer;padding:0;flex:none;font-family:inherit}
  .copydown:hover{background:var(--brass);color:#231A05;border-color:var(--brass)}
  #login{min-height:100vh;display:grid;place-items:center;width:100%}
  #login .box{width:350px;max-width:90vw}
  .menu-btn{display:none}
  @media(max-width:860px){
    .side{position:fixed;left:-260px;z-index:40;transition:left .2s;box-shadow:0 0 50px rgba(0,0,0,.25)}
    .side.open{left:0}
    .menu-btn{display:inline-grid;place-items:center;width:40px;height:40px;border-radius:9px;border:1.5px solid var(--line);background:var(--card);color:var(--ink);cursor:pointer;font-size:18px}
    .main{padding:18px 15px 60px}
    .backdrop{display:none;position:fixed;inset:0;background:rgba(20,26,18,.4);z-index:35}
    .backdrop.show{display:block}
    .calgrid{grid-template-columns:1fr}
    .frow{grid-template-columns:auto 1fr auto}
    .frow .meta{display:none}
  }
  @media print{.side,.head .menu-btn,#pactions,#msg,.nav{display:none!important}.main{padding:0}}
  @media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>

<div id="login" style="display:none">
  <div class="box card">
    <div class="brand" style="border:none;margin:0 0 6px;padding:0">
      <div class="mark" id="loginmark">G</div><div><b>Grey Door Studio</b><span>Production Tracker</span></div>
    </div>
    <div id="loginErr"></div>
    <label>Password</label>
    <input id="pw" type="password" onkeydown="if(event.key==='Enter')login()" autofocus>
    <button class="btn" style="width:100%;margin-top:12px" onclick="login()">Sign in</button>
  </div>
</div>

<div class="app" id="app" style="display:none">
  <div class="backdrop" id="backdrop" onclick="toggleNav(false)"></div>
  <aside class="side" id="side">
    <div class="brand"><div class="mark" id="navmark">G</div><div><b id="brandname">Grey Door Studio</b><span>Production</span></div></div>
    <div class="cswitch">
      <button onclick="toggleCMenu(event)"><span id="cname">Loading…</span><span style="opacity:.7">▾</span></button>
      <div class="cmenu" id="cmenu"></div>
    </div>
    <nav class="nav" id="nav">
      <button data-t="dashboard" onclick="go('dashboard')"><span class="ic">◱</span> Dashboard</button>
      <button data-t="orders" onclick="go('orders')"><span class="ic">▤</span> Orders</button>
      <button data-t="items" onclick="go('items')"><span class="ic">◈</span> Items</button>
      <button data-t="vendors" onclick="go('vendors')"><span class="ic">⚒</span> Vendors</button>
      <button data-t="insights" onclick="go('insights')"><span class="ic">◔</span> Insights</button>
      <button data-t="buyers" onclick="go('buyers')"><span class="ic">✦</span> Buyers</button>
      <button data-t="import" onclick="go('import')"><span class="ic">↑</span> Import PI</button>
      <button data-t="settings" onclick="go('settings')"><span class="ic">⚙</span> Settings</button>
    </nav>
    <div class="foot"><button onclick="logout()">Sign out</button></div>
  </aside>

  <main class="main">
    <div class="head">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="menu-btn" onclick="toggleNav(true)">☰</button>
        <div><h1 id="ptitle">Dashboard</h1><div class="sub" id="psub"></div></div>
      </div>
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
        <input id="gsearch" placeholder="Search items, PIs, buyers…" style="width:230px" oninput="debouncedSearch(this.value)">
        <div id="pactions"></div>
      </div>
    </div>
    <div id="msg"></div>
    <div id="view"></div>
  </main>
</div>

<script>
const $=(s)=>document.querySelector(s);
let TAB="dashboard", VENDORS=[], BUYERS=[], COORDS=[], OPEN_PI=null, IMPORT=null, CHARTS=[], ITEM_FILTER="all", ITEM_COLOR="status", COMPANIES=[], ACTIVE_C=null;
const VCOLORS=["#1F4D36","#C08A2E","#2E6B4A","#B5651D","#4A7C59","#8A6D3B","#356859","#A67C00"];
const vendorColor=(id)=>VCOLORS[(Number(id)||0)%VCOLORS.length];

async function api(url,opts={}){
  const r=await fetch("/api"+url,{headers:{"Content-Type":"application/json"},...opts});
  if(r.status===401){showLogin();throw new Error("Please sign in");}
  const j=await r.json().catch(()=>({}));
  if(!r.ok)throw new Error(j.error||"Request failed");
  return j;
}
function msg(t,cls="ok"){$("#msg").innerHTML=t?`<div class="msg ${cls}">${esc(t)}</div>`:"";if(t)setTimeout(()=>{if($("#msg").textContent===t)$("#msg").innerHTML="";},4000);}
function esc(s){return String(s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function dmy(iso){if(!iso)return"";const p=String(iso).split("-");return p.length===3?`${p[2]}/${p[1]}/${p[0].slice(2)}`:iso;}
function destroyCharts(){CHARTS.forEach(c=>{try{c.destroy()}catch(e){}});CHARTS=[];}
Chart.defaults.color="#7C7565";Chart.defaults.font.family="Outfit";Chart.defaults.borderColor="#E2DACA";
function statusPill(s,days){
  if(!s)return"";
  const m={green:["p-green","On track"],amber:["p-amber","Due soon"],red:["p-red","Last 5 days"],overdue:["p-red","Overdue"],done:["p-done","Complete"]};
  const[c,t]=m[s]||["p-done",s];
  const d=(s!=="done"&&days!=null)?(days<0?` · ${-days}d late`:` · ${days}d`):"";
  return `<span class="pill ${c}">${t}${d}</span>`;
}
function rowClass(s){return s?("row-"+(s==="overdue"?"red":s)):"";}
function barEl(pct,color){return `<div class="bar"><span style="width:${pct}%${color?`;background:${color}`:""}"></span></div>`;}

function showLogin(){$("#login").style.display="grid";$("#app").style.display="none";}
async function login(){try{await api("/login",{method:"POST",body:JSON.stringify({password:$("#pw").value})});$("#loginErr").innerHTML="";boot();}catch(e){$("#loginErr").innerHTML=`<div class="msg err">${esc(e.message)}</div>`;}}
async function logout(){await fetch("/api/logout",{method:"POST"});showLogin();}
function toggleNav(open){$("#side").classList.toggle("open",open);$("#backdrop").classList.toggle("show",open);}

async function boot(){
  try{
    const c=await api("/companies");COMPANIES=c.companies;ACTIVE_C=c.active;
    [VENDORS,BUYERS]=await Promise.all([api("/vendors"),api("/buyers")]);
    renderCSwitch();
    $("#login").style.display="none";$("#app").style.display="flex";go(TAB);
  }catch(e){showLogin();}
}
function renderCSwitch(){
  const cur=COMPANIES.find(c=>c.id===ACTIVE_C)||COMPANIES[0]||{name:"Set up a company"};
  $("#cname").textContent=cur.name;
  $("#brandname").textContent=cur.name;
  $("#navmark").textContent=(cur.short_name||cur.name||"?").slice(0,2).toUpperCase();
  $("#cmenu").innerHTML=COMPANIES.map(c=>`<button class="${c.id===ACTIVE_C?"on":""}" onclick="switchCompany(${c.id})">${c.id===ACTIVE_C?"✓":"　"} ${esc(c.name)}</button>`).join("")

async function switchCompany(id){
  await api(`/companies/${id}/activate`,{method:"POST"});
  ACTIVE_C=id;OPEN_PI=null;
  [VENDORS,BUYERS]=await Promise.all([api("/vendors"),api("/buyers")]);
  renderCSwitch();go(TAB);msg("Switched to "+(COMPANIES.find(c=>c.id===id)||{}).name);

async function addCompany(){
  const name=prompt("Company name:");if(!name||!name.trim())return;
  try{const c=await api("/companies",{method:"POST",body:JSON.stringify({name:name.trim()})});
    COMPANIES.push(c);await switchCompany(c.id);}catch(e){msg(e.message,"err");}
}
async function renameCompany(){
  const cur=COMPANIES.find(c=>c.id===ACTIVE_C);if(!cur)return;
  const name=prompt("Rename company:",cur.name);if(!name||!name.trim())return;
  await api(`/companies/${cur.id}`,{method:"PATCH",body:JSON.stringify({name:name.trim()})});
  cur.name=name.trim();renderCSwitch();msg("Renamed");
}
function go(t){

          ${(s.overdue_counts&&s.overdue_counts.by_vendor||[]).slice(0,4).map(v=>`<span class="vchip vlate">${esc(v.name)} · ${v.count}</span>`).join("")}

      ${overdue.length>8?`<div class="desc" style="margin-top:10px">+ ${overdue.length-8} more overdue</div>`:""}
    </div>

    <div class="focus week">
      <div class="fhead">
        <h2><span class="count">${week.length}</span> Due this week</h2>
        <button class="btn ghost" onclick="go('vendors')">See calendar →</button>

  try{const r=await api(`/pis/${id}/complete-all`,{method:"POST"});msg(`PI ${piNo}: ${r.count} SKUs completed and quantities filled`);viewOrders();}
  catch(e){msg(e.message,"err");}
}
async function closePI(id,piNo){
  if(!confirm(`Close PI ${piNo}? It moves to the Closed orders tab.`))return;
  try{await api(`/pis/${id}/close`,{method:"POST"});msg(`PI ${piNo} closed`);viewOrders();}
  catch(e){msg(e.message,"err");}
}
async function reopenPI(id){
  try{await api(`/pis/${id}/reopen`,{method:"POST"});msg("Order reopened");viewOrders();}

async function deletePI(id,piNo){

        <option value="">—</option>
        ${BUYERS.map(b=>`<option value="${b.id}"${p.buyer_id==b.id?" selected":""}>${esc(b.name)}</option>`).join("")}
      </select></div>
      <div><label>Company</label><select data-f="company_id">
        ${COMPANIES.map(c=>`<option value="${c.id}"${p.company_id==c.id?" selected":""}>${esc(c.name)}</option>`).join("")}
      </select><div class="desc" style="margin-top:4px;font-size:11px">Moves this PI to another company</div></div>
    </div>
    <div style="margin-top:12px"><label>Notes</label><textarea data-f="notes" rows="2">${esc(p.notes||"")}</textarea></div>
    <button class="btn" style="width:100%;margin-top:16px" id="esave">Save changes</button>
  </div>`;
  document.body.appendChild(wrap);
  wrap.querySelector("#eclose").onclick=()=>wrap.remove();

  wrap.querySelector("#esave").onclick=async()=>{
    const body={};

function skuBlock(s){
  const vopts=(sel)=>`<option value="">— pick vendor —</option>`+VENDORS.map(v=>`<option value="${v.id}"${sel==v.id?" selected":""}>${esc(v.name)}${v.lead_time_days?` · ${v.lead_time_days}d`:""}</option>`).join("");
  const parts=(s.vendors||[]).filter(v=>v.role==="part");
  const gb=(s.vendors||[]).find(v=>v.role==="giftbox");
  const lbl=(s.vendors||[]).find(v=>v.role==="labels");

  const vendorRow=(v)=>`<div class="vblock">
      <div class="vtop">
        <select class="mini" onchange="setAssign(${v.id},'vendor_id',this.value||null)">${vopts(v.vendor_id)}</select>
        <span class="desc">${v.due?`due ${dmy(v.due)}`:"no lead time set"}</span>
        ${statusPill(v.status,v.days_left)}
        <span class="desc" style="margin-left:auto">in hand <b style="color:var(--ink)">${v.in_hand}</b></span>
        <button class="btn tiny ghost" style="color:var(--late);border-color:var(--late-line)" onclick="removeAssign(${v.id})">Remove</button>
      </div>
      <div class="vgrid">
        <div><label>Received</label><input class="mini num" type="number" value="${v.received_qty||0}" onchange="setAssign(${v.id},'received_qty',this.value)"></div>
        <div><label>Date</label><input class="mini" type="date" value="${v.received_date||""}" onchange="setAssign(${v.id},'received_date',this.value)"></div>
        ${[1,2,3].map(n=>`
        <div><label>Ret ${n} out</label><input class="mini num" type="number" value="${v["r"+n+"_qty"]||0}" onchange="setAssign(${v.id},'r${n}_qty',this.value)"></div>
        <div><label>Date</label><input class="mini" type="date" value="${v["r"+n+"_date"]||""}" onchange="setAssign(${v.id},'r${n}_date',this.value)"></div>
        <div><label>Ret ${n} back</label><input class="mini num" type="number" value="${v["r"+n+"_back_qty"]||0}" onchange="setAssign(${v.id},'r${n}_back_qty',this.value)"></div>
        <div><label>Date</label><input class="mini" type="date" value="${v["r"+n+"_back_date"]||""}" onchange="setAssign(${v.id},'r${n}_back_date',this.value)"></div>`).join("")}
      </div>
    </div>`;

  return `<div class="card skucard rail ${rowClass(s.status)}" style="margin-bottom:12px">
    <div class="skuhead" onclick="toggleSku(${s.id})">
      <div>
        <span class="code" style="font-size:15px">${esc(s.item_no)}</span>
        <span class="desc" style="margin-left:8px">${esc(s.buyer_no||"")}${s.description?" · "+esc(s.description):""}</span>
      </div>
      <div class="skustats" onclick="event.stopPropagation()">
        <span class="desc">qty <input class="mini num" type="number" value="${s.qty}" title="Order quantity" onchange="setSku(${s.id},'qty',this.value)"></span>
        <span class="desc">in hand <b style="color:var(--ok)">${s.in_hand}</b></span>
        <span class="desc">due <b style="color:${s.still_due>0?"var(--late)":"var(--ok)"}">${s.still_due}</b></span>
        <span style="min-width:90px">${barEl(s.progress_pct)}</span>
        ${statusPill(s.status,s.days_left)}
        <button class="btn tiny ghost" style="color:var(--late);border-color:var(--late-line)" title="Remove this SKU" onclick="deleteSku(${s.id},'${esc(s.item_no)}')">✕</button>
        <span class="chev" id="chev-${s.id}" onclick="toggleSku(${s.id})" style="cursor:pointer">▾</span>
      </div>
    </div>
    <div class="skubody" id="body-${s.id}" style="display:${OPEN_SKUS.has(s.id)?"block":"none"}">
      <div class="vsection">
        <div class="vsechead"><b>Vendors</b>
          <button class="btn tiny" onclick="addAssign(${s.id},'part')">+ Add vendor</button></div>
        ${parts.length?parts.map(vendorRow).join(""):`<div class="desc" style="padding:6px 0">No vendors yet — add one to set a due date.</div>`}
      </div>
      <div class="vsection">
        <div class="vsechead"><b>Extras</b></div>
        <div class="extras">
          <label class="cbx"><input type="checkbox" ${s.gift_box?"checked":""} onchange="setSku(${s.id},'gift_box',this.checked?1:0)"> Gift box</label>
          ${s.gift_box?`<select class="mini" onchange="${gb?`setAssign(${gb.id},'vendor_id',this.value||null)`:`addAssignWith(${s.id},'giftbox',this.value)`}">${vopts(gb?gb.vendor_id:"")}</select>`:``}
          <label class="cbx"><input type="checkbox" ${s.labels_needed?"checked":""} onchange="setSku(${s.id},'labels_needed',this.checked?1:0)"> Labels needed</label>
          <label class="cbx"><input type="checkbox" ${s.labels_ordered?"checked":""} onchange="setSku(${s.id},'labels_ordered',this.checked?1:0)"> Labels ordered</label>

        </div>

    </div>
  </div>`;
}

async function deleteSku(id,itemNo){
  if(!confirm(`Remove SKU ${itemNo} from this PI?\n\nIts vendor assignments and received quantities will be deleted.`))return;
  try{await api("/skus/"+id,{method:"DELETE"});msg(`${itemNo} removed`);viewPIDetail(OPEN_PI);}
  catch(e){msg(e.message,"err");}
}
async function addSku(piId){
  const item=prompt("Item number:");if(!item||!item.trim())return;
  const qty=prompt("Order quantity:","0");
  try{await api(`/pis/${piId}/skus`,{method:"POST",body:JSON.stringify({item_no:item.trim(),qty:parseInt(qty,10)||0})});
    msg("SKU added");viewPIDetail(piId);}
  catch(e){msg(e.message,"err");}
}

let OPEN_SKUS=new Set();
function toggleSku(id){

function renderCalendar(tl){
  // gather all items across vendors, grouped by week
  const items=[];
  tl.forEach(v=>v.items.forEach(it=>{if(it.due&&!it.complete)items.push({...it,vid:v.id,vname:v.name});}));
  if(!items.length){$("#calendar").innerHTML=`<div class="card empty">No scheduled items yet. Assign vendors with lead times to fill the calendar.</div>`;return;}
  const today=new Date();today.setHours(0,0,0,0);
  const mon=(d)=>{const x=new Date(d);x.setHours(0,0,0,0);x.setDate(x.getDate()-((x.getDay()+6)%7));return x;};
  const thisMon=mon(today);
  const weekName=(w)=>{const diff=Math.round((w-thisMon)/6048e5);return diff===0?"This week":diff===1?"Next week":diff<0?`${-diff} week${-diff>1?"s":""} ago`:`In ${diff} weeks`;};
  const byWeek={};
  items.forEach(it=>{const w=mon(new Date(it.due+"T00:00:00")).getTime();(byWeek[w]=byWeek[w]||[]).push(it);});
  const weeks=Object.keys(byWeek).map(Number).sort();
  const dnames=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
  $("#calendar").innerHTML=weeks.map(wk=>{
    const wd=new Date(wk);
    const cells=[];
    for(let i=0;i<7;i++){
      const day=new Date(wk+i*864e5);const iso=day.toISOString().slice(0,10);
      const its=byWeek[wk].filter(x=>x.due===iso);
      const isToday=day.getTime()===today.getTime();
      cells.push(`<div class="calcell ${isToday?"today":""}"><div class="d">${dnames[i]} ${day.getDate()}/${day.getMonth()+1}</div>
        ${its.map(x=>`<div class="calitem ci-${x.status==="overdue"?"red":x.status==="red"?"red":x.status==="amber"?"amber":"green"}" title="${esc(x.vname)} · PI ${esc(x.pi||"")}">${esc(x.item)} · PI${esc(x.pi||"")}</div>`).join("")}
      </div>`);
    }
    return `<div class="weekgroup"><h4>${weekName(wd)}</h4><div class="calgrid">${cells.join("")}</div></div>`;
  }).join("");
}

        ${dg.email_configured?`<button class="btn" onclick="sendDigest()">Send now</button>`:""}
      </div>
      <div class="tiles" style="margin-bottom:14px">
        <div class="tile late"><div class="edge"></div><div class="k">Overdue</div><div class="v">${dg.overdue.length}</div></div>
        <div class="tile brass"><div class="edge"></div><div class="k">Due in 7 days</div><div class="v">${dg.dueSoon.length}</div></div>
        <div class="tile"><div class="edge"></div><div class="k">Open SKUs</div><div class="v">${dg.totals.open_skus}</div></div>
        <div class="tile"><div class="edge"></div><div class="k">Pieces due</div><div class="v">${dg.totals.pieces_due.toLocaleString("en-IN")}</div></div>
      </div>
      ${dg.overdue.length?`<label>Overdue</label><div class="tablewrap" style="margin-bottom:12px"><table>
        <thead><tr><th>Item</th><th>PI / Buyer</th><th>Coordinator</th><th>Still due</th><th>Late by</th><th>Vendor</th></tr></thead>
        <tbody>${dg.overdue.map(r=>`<tr class="rail row-red"><td class="code">${esc(r.item)}</td>
          <td>PI ${esc(r.pi)}<div class="desc">${esc(r.buyer||"")}</div></td>
          <td class="desc">${esc(r.coordinator||"—")}</td>
          <td>${r.still_due}</td><td style="color:var(--late);font-weight:700">${Math.abs(r.days)}d</td>
          <td class="desc">${esc(r.late_vendors.join(", "))}</td></tr>`).join("")}</tbody></table></div>`:""}
      ${dg.dueSoon.length?`<label>Due in the next 7 days</label><div class="tablewrap"><table>
        <thead><tr><th>Item</th><th>PI / Buyer</th><th>Coordinator</th><th>Still due</th><th>When</th><th>Vendor</th></tr></thead>
        <tbody>${dg.dueSoon.map(r=>`<tr class="rail row-amber"><td class="code">${esc(r.item)}</td>
          <td>PI ${esc(r.pi)}<div class="desc">${esc(r.buyer||"")}</div></td>
          <td class="desc">${esc(r.coordinator||"—")}</td>
          <td>${r.still_due}</td><td>${r.days===0?"today":r.days===1?"tomorrow":"in "+r.days+" days"}</td>
          <td class="desc">${esc(r.vendors.join(", "))}</td></tr>`).join("")}</tbody></table></div>`:""}
    </div>`;
}
async function saveAlertEmails(){
  const v=$("#alertemails").value;
  try{await api(`/companies/${ACTIVE_C}`,{method:"PATCH",body:JSON.stringify({alert_emails:v})});msg("Recipients saved");viewSettings();}
  catch(e){msg(e.message,"err");}
}
async function sendDigest(){
  try{const r=await api("/digest/send",{method:"POST"});
    msg(r.sent?`Digest emailed to ${(r.recipients||[]).length} recipient(s) — ${r.overdue} overdue`:`Not sent: ${r.reason}`,r.sent?"ok":"err");}
  catch(e){msg(e.message,"err");}
}
async function restoreBackup(file){
  if(!file)return;
  if(!confirm("Restoring replaces ALL current data in this app with the contents of the backup file.\n\nContinue?"))return;
  try{
    const text=await file.text();
    const dump=JSON.parse(text);
    const r=await api("/import/backup",{method:"POST",body:JSON.stringify({dump})});
    msg("Restored: "+Object.entries(r.restored).map(([k,v])=>`${v} ${k}`).join(", "));
    const c=await api("/companies");COMPANIES=c.companies;ACTIVE_C=c.active;renderCSwitch();
    [VENDORS,BUYERS]=await Promise.all([api("/vendors"),api("/buyers")]);
    go("dashboard");
  }catch(e){msg("Restore failed: "+e.message,"err");}
}

function viewImport(){
  $("#view").innerHTML=`<div class="card" style="max-width:640px">
    <h3 style="font-family:'Fraunces',serif;font-weight:600;font-size:16px;margin:0 0 6px;color:var(--brass)">Import a proforma invoice</h3>
    <p class="sub" style="margin:0 0 14px">Choose your PI as a <b>PDF</b> or an <b>Excel/CSV</b> export — either works. The details and every SKU are read automatically, and you review before anything is saved.</p>
    <input type="file" accept=".xlsx,.xls,.csv,.pdf" onchange="preview(this.files[0])">
    <div id="prev"></div>
  </div>`;
}
async function preview(file){
  if(!file)return;$("#prev").innerHTML=`<p class="sub" style="margin-top:14px">Reading ${esc(file.name)}…</p>`;
  const fd=new FormData();fd.append("file",file);
  try{
    const r=await fetch("/api/import/preview",{method:"POST",body:fd});const j=await r.json();
    if(!r.ok){const err=new Error(j.error||"Could not read that file");err.sample=j.sample;throw err;}
    IMPORT=j;
    const clist=j.companies||COMPANIES;
    const detected=j.detected_company_name;
    const head=`<hr style="border:none;border-top:1px solid var(--line);margin:16px 0">
      <div class="msg ${detected?"ok":""}" style="${detected?"":"display:none"}">Recognised <b>${esc(detected||"")}</b> on this invoice — filing it under that company.</div>
      <div class="grid2">
        <div style="grid-column:1/-1"><label>Company (which of your businesses this PI belongs to)</label>
          <select id="i_company">${clist.map(c=>`<option value="${c.id}"${j.detected_company_id==c.id?" selected":""}>${esc(c.name)}</option>`).join("")}</select></div>
        <div><label>PI number *</label><input id="i_pi" value="${esc(j.detected.pi_no)}"></div>
        <div><label>PO number</label><input id="i_po" value="${esc(j.detected.po_no)}"></div>
        <div><label>Buyer</label><input id="i_buyer" list="blist" value="${esc(j.detected.buyer)}"><datalist id="blist">${BUYERS.map(b=>`<option>${esc(b.name)}</option>`).join("")}</datalist></div>
        <div><label>PI date</label><input id="i_date" type="date" value="${j.detected.pi_date||""}"></div>
        <div><label>Ex-factory date</label><input id="i_exf" type="date" value="${j.detected.ex_factory_date||""}"></div>
        <div><label>Ship date</label><input id="i_ship" type="date" value="${j.detected.ship_date||""}"></div>
      </div>`;
    if(j.mode==="invoice"){
      const tq=j.skus.reduce((t,s)=>t+(+s.qty||0),0);
      $("#prev").innerHTML=head+`
        <div class="msg ok" style="margin-top:14px">✓ Read ${j.source==="pdf"?"your PDF":"the file"} automatically — ${j.rowCount} SKUs · ${tq.toLocaleString("en-IN")} pcs.</div>
        <div class="tablewrap" style="max-height:280px"><table><thead><tr><th>Item</th><th>Buyer No</th><th>Description</th><th>Qty</th></tr></thead>
        <tbody>${j.skus.map(s=>`<tr><td class="code">${esc(s.item_no)}</td><td>${esc(s.buyer_no)}</td><td class="desc">${esc(s.description)}</td><td>${esc(s.qty)}</td></tr>`).join("")}</tbody></table></div>
        <button class="btn" style="margin-top:14px" id="cbtn" onclick="commit()">Import this PI</button>`;
      return;
    }
    const opts=(sel)=>`<option value=""></option>`+j.headers.map(h=>`<option${h===sel?" selected":""}>${esc(h)}</option>`).join("");
    $("#prev").innerHTML=head+`
      <h3 style="font-family:'Fraunces',serif;font-size:14px;margin:16px 0 8px">Match columns · ${j.rowCount} rows</h3>
      <div class="grid2">
        <div><label>Item No *</label><select id="m_item">${opts(j.mapping.item_no)}</select></div>
        <div><label>Buyer No</label><select id="m_buyerno">${opts(j.mapping.buyer_no)}</select></div>
        <div><label>Description</label><select id="m_desc">${opts(j.mapping.description)}</select></div>
        <div><label>Quantity *</label><select id="m_qty">${opts(j.mapping.qty)}</select></div>
      </div>
      <button class="btn" style="margin-top:14px" id="cbtn" onclick="commit()">Import this PI</button>`;
  }catch(e){
    let extra="";
    if(e && e.sample){
      extra=`<div class="card" style="margin-top:12px">
        <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:8px">
          <b style="font-size:13px">What the PDF reader found</b>
          <button class="btn tiny ghost" onclick="navigator.clipboard.writeText(document.getElementById('pdfdiag').textContent);msg('Copied — paste this to get the format supported')">Copy text</button>
        </div>
        <pre id="pdfdiag" style="white-space:pre-wrap;font-size:11.5px;max-height:260px;overflow:auto;background:var(--bg2);padding:10px;border-radius:8px;margin:0">${esc(e.sample)}</pre>
      </div>`;
    }
    $("#prev").innerHTML=`<div class="msg err" style="margin-top:14px">${esc(e.message)}</div>`+extra;
  }
}
function showDiff(j,body){
  const d=j.diff;
  const wrap=document.createElement("div");
  wrap.style.cssText="position:fixed;inset:0;background:rgba(20,26,18,.5);z-index:70;display:grid;place-items:center;padding:16px";
  const rows=(list,cls,fmt)=>list.length?`<div class="tablewrap" style="max-height:170px;margin-bottom:10px"><table><tbody>
      ${list.map(x=>`<tr class="rail ${cls}"><td>${fmt(x)}</td></tr>`).join("")}</tbody></table></div>`:"";
  wrap.innerHTML=`<div class="card" style="max-width:560px;width:100%;max-height:88vh;overflow:auto">
    <h3 style="font-family:'Fraunces',serif;font-weight:600;font-size:19px;margin:0 0 4px;color:var(--green)">PI already exists — update it?</h3>
    <p class="sub" style="margin:0 0 14px">This PI is already in the system. Here's what this file would change. Vendors and received quantities on unchanged SKUs are kept.</p>
    ${d.changed.length?`<label>Quantity changes (${d.changed.length})</label>${rows(d.changed,"row-amber",x=>`<b class="code">${esc(x.item_no)}</b> &nbsp; ${x.from} → <b>${x.to}</b>`)}`:""}
    ${d.added.length?`<label>New SKUs to add (${d.added.length})</label>${rows(d.added,"row-green",x=>`<b class="code">${esc(x.item_no)}</b> &nbsp; qty ${x.qty}`)}`:""}
    ${d.removed.length?`<label style="color:var(--late)">SKUs no longer on the PI — will be REMOVED (${d.removed.length})</label>
      ${rows(d.removed,"row-red",x=>`<b class="code">${esc(x.item_no)}</b> &nbsp; qty ${x.qty}${x.received?` · <span style="color:var(--late)">${x.received} already received</span>`:""}`)}
      <label class="cbx" style="margin:4px 0 12px"><input type="checkbox" id="dokeep"> Keep these SKUs instead of removing them</label>`:""}
    <div class="desc" style="margin-bottom:14px">${d.unchanged} SKU${d.unchanged===1?"":"s"} unchanged.</div>
    <div style="display:flex;gap:9px;flex-wrap:wrap">
      <button class="btn" id="doupd">Update this PI</button>
      <button class="btn ghost" id="donew">Import as a separate PI</button>
      <button class="btn ghost" id="docancel">Cancel</button>
    </div>
  </div>`;
  document.body.appendChild(wrap);
  const close=()=>wrap.remove();
  wrap.querySelector("#docancel").onclick=close;
  wrap.onclick=(e)=>{if(e.target===wrap)close();};
  wrap.querySelector("#donew").onclick=()=>{close();commit(true);};
  wrap.querySelector("#doupd").onclick=async()=>{
    const keep=wrap.querySelector("#dokeep");
    close();
    await commitUpdate(body,keep?!keep.checked:true);
  };
}
async function commitUpdate(body,removeMissing){
  try{
    const r=await fetch("/api/import/commit",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({...body,updateExisting:true,removeMissing})});
    const j=await r.json();
    if(!r.ok)throw new Error(j.error);
    msg(`PI updated — ${j.updated} quantities changed, ${j.inserted} added, ${j.deleted} removed`);
    OPEN_PI=j.piId;ORDER_SCOPE="open";go("orders");
  }catch(e){msg(e.message,"err");}
}

async function commit(allowDuplicate){
  const btn=$("#cbtn");if(btn){btn.disabled=true;btn.textContent="Importing…";}
  try{
    const body={importId:IMPORT.importId,allowDuplicate:!!allowDuplicate,
      pi:{pi_no:$("#i_pi").value,po_no:$("#i_po").value,buyer:$("#i_buyer").value,
          buyer_address:(IMPORT.detected&&IMPORT.detected.buyer_address)||"",
          company_id:($("#i_company")?$("#i_company").value:null),
          pi_date:$("#i_date").value,ex_factory_date:$("#i_exf").value,ship_date:$("#i_ship").value}};
    if(IMPORT.mode==="table")body.mapping={item_no:$("#m_item").value,buyer_no:$("#m_buyerno").value,description:$("#m_desc").value,qty:$("#m_qty").value};
    const r=await fetch("/api/import/commit",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
    const j=await r.json();
    if(r.status===409){
      if(j.diff){showDiff(j,body);return;}
      if(confirm(j.error+". Import again anyway?"))return commit(true);
      throw new Error("Import cancelled");
    }
    if(!r.ok)throw new Error(j.error);
    const chosen=$("#i_company")?Number($("#i_company").value):ACTIVE_C;
    if(chosen&&chosen!==ACTIVE_C){await api(`/companies/${chosen}/activate`,{method:"POST"});ACTIVE_C=chosen;renderCSwitch();}
    [VENDORS,BUYERS]=await Promise.all([api("/vendors"),api("/buyers")]);
    msg(`Imported ${j.count} SKUs${j.carried?` · ${j.carried} reused earlier settings`:""}`);
    OPEN_PI=j.piId;ORDER_SCOPE="open";go("orders");
  }catch(e){msg(e.message,"err");}
  finally{if(btn){btn.disabled=false;btn.textContent="Import this PI";}}
}

boot();
</script>
